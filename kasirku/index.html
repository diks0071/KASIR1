<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 KasirKu - Aplikasi Kasir Lengkap</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Tombol mobile -->
    <button class="mobile-toggle no-print" onclick="toggleSidebar()" title="Menu">☰</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo"><span>💳</span> KasirKu</div>
        <nav>
            <a class="active" data-page="pos" onclick="navigate('pos')"><span class="icon">🛒</span> Kasir</a>
            <a data-page="products" onclick="navigate('products')"><span class="icon">📦</span> Produk</a>
            <a data-page="history" onclick="navigate('history')"><span class="icon">📋</span> Riwayat</a>
            <a data-page="dashboard" onclick="navigate('dashboard')"><span class="icon">📊</span> Dashboard</a>
        </nav>
    </aside>

    <!-- Konten utama -->
    <main class="main" id="main-content"></main>

    <!-- Modal Tambah/Edit Produk -->
    <div class="modal-overlay" id="modal-product">
        <div class="modal">
            <h2 id="modal-product-title">➕ Tambah Produk</h2>
            <div class="form-group"><label>Nama</label><input type="text" id="prod-name"></div>
            <div class="form-group"><label>Kategori</label><input type="text" id="prod-category"></div>
            <div class="form-group"><label>Harga</label><input type="number" id="prod-price" min="0"></div>
            <div class="form-group"><label>Stok</label><input type="number" id="prod-stock" min="0"></div>
            <div class="form-group"><label>Emoji</label><input type="text" id="prod-emoji" maxlength="3"></div>
            <input type="hidden" id="prod-edit-id">
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="closeModal('modal-product')">Batal</button>
                <button class="btn btn-primary" onclick="saveProduct()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Struk -->
    <div class="modal-overlay" id="modal-receipt">
        <div class="modal" style="max-width:360px">
            <h2>🧾 Transaksi Berhasil!</h2>
            <div id="receipt-content" style="font-size:0.8rem;line-height:1.6;background:#fffbeb;padding:14px;border-radius:8px;"></div>
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="closeModal('modal-receipt')">Tutup</button>
                <button class="btn btn-primary" onclick="printReceipt()">Cetak Struk</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Area cetak -->
    <div id="print-area" style="display:none;"></div>

    <!-- Input file restore (hidden) -->
    <input type="file" id="restore-file-input" accept=".json" style="display:none" onchange="handleRestoreFile(event)">

    <!-- Script -->
    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
